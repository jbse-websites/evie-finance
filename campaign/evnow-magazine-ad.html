<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EV Now — Magazine Ad Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 40px;
      gap: 60px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .label {
      color: #555;
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: -40px;
    }

    /* ── A4 FULL PAGE ── */
    .ad {
      width: 794px;
      height: 1123px;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    /* ── HALF PAGE LANDSCAPE ── */
    .ad-half {
      width: 794px;
      height: 560px;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    @media print {
      body { background: #000; padding: 0; gap: 0; }
      .label { display: none; }
      .ad, .ad-half { page-break-after: always; }
    }
  </style>
</head>
<body>

<p class="label">EV Now · Full Page A4 · NZ Autocar / EVs & Beyond</p>
